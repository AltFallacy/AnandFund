<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background: #2c3e50; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .footer { font-size: 12px; text-align: center; margin-top: 20px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Anandvan</h1>
        </div>
        <p>Hi {{ username }},</p>
        <p>Thank you for joining Anandvan! We are thrilled to have you as part of our community dedicated to transparency and social impact.</p>
        <p>You can now log in to your dashboard to track projects and make contributions.</p>
        <div class="footer">
            &copy; 2026 Anandvan Organization
        </div>
    </div>
</body>
</html>
