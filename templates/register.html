<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Anandvan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #0d1117;
            --surface: #161b22;
            --border: rgba(255,255,255,0.08);
            --text: #e6edf3;
            --muted: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 45px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .card-header .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #2ecc71, #1abc9c);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4em; color: white;
            margin: 0 auto 18px;
            box-shadow: 0 8px 25px rgba(46,204,113,0.35);
        }
        .card-header h2 {
            font-size: 1.7em;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }
        .card-header p { color: var(--muted); font-size: 0.88em; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.8em;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.88em;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 13px 15px 13px 42px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.92em;
            font-family: inherit;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
        }
        .form-group input::placeholder { color: rgba(139,148,158,0.45); }
        .form-group input:focus, .form-group select:focus {
            border-color: rgba(46,204,113,0.45);
            box-shadow: 0 0 0 3px rgba(46,204,113,0.08);
        }
        .form-group select { padding-left: 42px; cursor: pointer; }
        .form-group select option { background: #1a2230; color: var(--text); }

        /* Role selector cards */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }
        .role-option {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s;
            position: relative;
        }
        .role-option:hover {
            border-color: rgba(46,204,113,0.3);
            background: rgba(46,204,113,0.04);
        }
        .role-option.selected {
            border-color: var(--primary);
            background: rgba(46,204,113,0.1);
        }
        .role-option input[type="radio"] { display: none; }
        .role-option i { font-size: 1.4em; color: var(--muted); display: block; margin-bottom: 6px; }
        .role-option.selected i { color: var(--primary); }
        .role-option span { font-size: 0.85em; font-weight: 600; color: var(--muted); }
        .role-option.selected span { color: var(--text); }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(46,204,113,0.3);
            margin-top: 8px;
        }
        .btn-register:hover {
            background: #2ecc71;
            box-shadow: 0 10px 28px rgba(46,204,113,0.45);
            transform: translateY(-2px);
        }

        .divider { height: 1px; background: var(--border); margin: 25px 0; }

        .links { text-align: center; }
        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.88em;
            font-weight: 500;
        }
        .links a:hover { text-decoration: underline; }
        .links p { color: var(--muted); font-size: 0.88em; margin-bottom: 8px; }

        .flash {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.25);
            color: #eb7e72;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 22px;
            font-size: 0.88em;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="card-header">
            <div class="brand-icon"><i class="fas fa-leaf"></i></div>
            <h2>Join Anandvan</h2>
            <p>Create your account to get started</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="regForm">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
                </div>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <div class="role-selector">
                    <label class="role-option selected" id="role-donor">
                        <input type="radio" name="role" value="Donor" checked>
                        <i class="fas fa-heart"></i>
                        <span>Donor</span>
                    </label>
                    <label class="role-option" id="role-staff">
                        <input type="radio" name="role" value="Staff">
                        <i class="fas fa-user-tie"></i>
                        <span>Staff</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-register" id="regBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="divider"></div>
        <div class="links">
            <p>Already have an account? <a href="{{ url_for('main.login') }}">Sign In</a></p>
            <p style="margin-top: 10px;"><a href="{{ url_for('main.index') }}"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>

    <script>
        // Role selector interaction
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Loading state on submit
        document.getElementById('regForm').addEventListener('submit', function() {
            const btn = document.getElementById('regBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
