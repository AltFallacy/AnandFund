{% extends "base.html" %}

{% block content %}
<h2>Make a Donation</h2>

<div class="card" style="max-width: 600px; margin: auto;">
    <h3 style="text-align: center; color: #27ae60;">Support Our Cause</h3>
    <form action="{{ url_for('main.donate') }}" method="POST">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="donor_name" value="{{ current_user.username if current_user.is_authenticated else '' }}" required>
        </div>
        <div class="form-group">
            <label>Your Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Donation Amount (₹)</label>
            <input type="number" step="0.01" name="amount" min="1" required>
        </div>
        <div class="form-group">
            <label>Select Project/Cause</label>
            <select name="project_id" required>
                {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" style="width: 100%; background: #27ae60; font-size: 18px; font-weight: bold; padding: 15px;">Donate Now via Secure Gateway</button>
        <p style="text-align: center; font-size: 12px; margin-top: 10px; color: #7f8c8d;">This is a demonstration form. No actual payment will be processed.</p>
    </form>
</div>

{% endblock %}
